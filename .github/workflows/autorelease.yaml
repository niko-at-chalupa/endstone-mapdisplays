name: Auto Release (Maturin)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: windows-latest
            target: x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libavcodec-dev libavformat-dev libavutil-dev libswscale-dev

      - name: Build and Repair Wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # The 'manylinux' arg on Linux automatically runs 'auditwheel' 
          # to bundle the FFmpeg .so files into the wheel.
          manylinux: auto
          args: --release --out dist

      - name: Repair Wheel (Windows Only)
        if: runner.os == 'Windows'
        run: |
          pip install delvewheel
          # You'll need to point this to where FFmpeg is on the Windows runner
          # Or use a static build of FFmpeg to avoid this step!
          delvewheel repair --add-path bin/ dist/*.whl

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          # This will grab the 'repaired' wheels from both matrix runs
          files: dist/*.whl