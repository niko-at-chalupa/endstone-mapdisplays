name: Auto Release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.*'

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: windows-latest
            target: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install FFmpeg dev libraries (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libavutil-dev libavformat-dev libavcodec-dev libswscale-dev
      
      - name: Setup FFmpeg (Windows)
        if: runner.os == 'Windows'
        uses: FedericoCarboni/setup-ffmpeg@v3
        id: setup-ffmpeg
      
      - name: Build Wheel
        uses: PyO3/maturin-action@v1
        env:
          FFMPEG_DIR: ${{ (runner.os == 'Windows' && steps.setup-ffmpeg.outputs.ffmpeg-path) || '' }}
          FFMPEG_DISABLE_VCPKG: 1
          PKG_CONFIG_ALLOW_SYSTEM_LIBS: 1
        with:
          target: ${{ matrix.target }}
          manylinux: off
          args: --release --out dist
      
      - name: Repair Windows Wheel
        if: runner.os == 'Windows'
        run: |
          pip install delvewheel
          # Use the 'ffmpeg-path' output to find the DLLs
          delvewheel repair --add-path "${{ steps.setup-ffmpeg.outputs.ffmpeg-path }}\bin" dist/*.whl --wheel-dir dist/
          # Clean up the original unrepaired wheel
          rm dist/*-none-any.whl -ErrorAction SilentlyContinue
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*.whl